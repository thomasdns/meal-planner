name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality:
    name: Lint, test and build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: meal_planner_user
          POSTGRES_PASSWORD: meal_planner_password
          POSTGRES_DB: meal_planner_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U meal_planner_user -d meal_planner_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://meal_planner_user:meal_planner_password@localhost:5432/meal_planner_db
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: Y2ktbmV4dGF1dGgtc2VjcmV0LW1lYWwtcGxhbm5lcg==
      NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: Y2ktc2VydmVyLWFjdGlvbnMta2V5LTMyLWJ5dGVzISE=
      SMTP_TEST_MODE: "true"
      EMAIL_FROM: "Meal Planner CI <ci@example.com>"
      NEXT_PUBLIC_GOOGLE_ANALYTICS_ID: G-TEST123456

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.14.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build application
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: npm run test:e2e:ci

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-diagnostics
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

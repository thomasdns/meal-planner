name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality:
    name: Lint, test and build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: meal_planner_user
          POSTGRES_PASSWORD: meal_planner_password
          POSTGRES_DB: meal_planner_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U meal_planner_user -d meal_planner_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://meal_planner_user:meal_planner_password@localhost:5432/meal_planner_db
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-nextauth-secret
      NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ci-server-actions-key
      ADMIN_EMAILS: admin@example.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build application
        run: npm run build
